name: E2E

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  schedule:
    # Every Friday at 04:00 UTC
    - cron: '0 4 * * 5'

jobs:
  e2e:
    name: E2E Tests
    timeout-minutes: 90
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22.x
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Verify prerequisites
        run: |
          node --version
          python --version
          java -version
          mvn --version
      - name: Install
        run: yarn --skip-integrity-check --network-timeout 100000
      - name: E2E Tests
        run: yarn test:e2e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # https://github.com/microsoft/vscode-ripgrep/issues/9 (needed when e2e tests build the Theia repo)
