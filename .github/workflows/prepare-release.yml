name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (major, minor, patch, next, or custom)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - next
          - custom
      custom_version:
        description: 'Custom version (required if release_type is custom)'
        required: false
        type: string
      release_repo:
        description: 'GLSP repository to release'
        required: true
        type: choice
        options:
          - glsp
          - glsp-client
          - glsp-theia-integration
          - glsp-server
          - glsp-server-node
          - glsp-eclipse-integration
          - glsp-vscode-integration
          - glsp-playwright
      branch:
        description: 'Branch to use for the release repo (default: default branch)'
        required: false
        type: string
      draft:
        description: 'Create PR as draft'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      release_type:
        description: 'Release type (major, minor, patch, next, or custom)'
        required: true
        type: string
      custom_version:
        description: 'Custom version (required if release_type is custom)'
        required: false
        type: string
      release_repo:
        description: 'GLSP repository to release'
        required: true
        type: string
      branch:
        description: 'Branch to use for the release repo (default: default branch)'
        required: false
        type: string
      draft:
        description: 'Create PR as draft'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release helper repo (@eclipse-glsp/glsp)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: eclipse-glsp/glsp
          path: glsp-release-helper
          ref: master

      - name: Checkout release repo (${{ inputs.release_repo || github.event.inputs.release_repo }})
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: eclipse-glsp/${{ inputs.release_repo || github.event.inputs.release_repo }}
          path: release-repo
          ref: ${{ inputs.branch || github.event.inputs.branch }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: glsp-release-helper/package.json
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: glsp-release-helper/pnpm-lock.yaml

      - name: Set up Java 21
        if: >-
          (inputs.release_repo || github.event.inputs.release_repo) == 'glsp-server' ||
          (inputs.release_repo || github.event.inputs.release_repo) == 'glsp-eclipse-integration'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Python
        if: (inputs.release_repo || github.event.inputs.release_repo) == 'glsp-theia-integration'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Build glsp-release-helper
        working-directory: ./glsp-release-helper
        run: pnpm build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release
        id: prepare_release
        working-directory: ./glsp-release-helper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT_FLAG=""
          if [[ "${{ inputs.draft || github.event.inputs.draft }}" == "true" ]]; then
            DRAFT_FLAG="-d"
          fi

          if [[ "${{ inputs.release_type || github.event.inputs.release_type }}" == "custom" ]]; then
            pnpm glsp releng prepare custom "${{ inputs.custom_version || github.event.inputs.custom_version }}" -r ${{ github.workspace }}/release-repo $DRAFT_FLAG
          else
            pnpm glsp releng prepare "${{ inputs.release_type || github.event.inputs.release_type }}" -r ${{ github.workspace }}/release-repo $DRAFT_FLAG
          fi
