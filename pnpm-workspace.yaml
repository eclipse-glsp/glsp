packages:
    - 'dev-packages/*'

auto-install-peers: false

# Tooling (eslint, prettier, vitest, rimraf, @eclipse-glsp/*-config, ...) is provided
# as transitive deps of @eclipse-glsp/dev and must resolve from the workspace root
# Public-hoist only the dev tooling; app/runtime deps stay strictly isolated.
publicHoistPattern:
    - '@eclipse-glsp/*config*'
    - '@eclipse-glsp/cli'
    - 'eslint'
    - 'eslint-*'
    - '@eslint/*'
    - '@stylistic/*'
    - '@tony.ganchev/*'
    - '@typescript-eslint/*'
    - 'typescript-eslint'
    - 'globals'
    - 'prettier'
    - 'prettier-plugin-*'
    - 'vitest'
    - '@vitest/*'
    - 'rimraf'
    - '@types/*'

# Minimum-version floors for transitive deps with known advisories. Harmless no-ops when a dep is
# absent from the tree, protective when it is pulled transitively (e.g. via vite/vitest/istanbul).
# - serialize-javascript: RCE/DoS (GHSA-5c6j-r48x-rmvq, GHSA-qj8w-gfj5-8c6v).
# - uuid / js-yaml: bounds-check & ReDoS fixes (GHSA-w5hq-g745-h8pq, GHSA-h67p-54hq-rp68).
# - diff: jsdiff ReDoS (GHSA-73rr-hh4g-fpgx).
overrides:
    serialize-javascript: '>=7.0.5'
    uuid: '>=11.1.1'
    js-yaml: '>=4.1.2'
    diff: '>=8.0.3'

# Deps allowed to run install/build scripts
allowBuilds:
    esbuild: true
    unrs-resolver: true

# Min age (minutes) of dependency versions to install — supply-chain hardening. 4320 = 72h.
minimumReleaseAge: 4320
minimumReleaseAgeIgnoreMissingTime: false
